<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Admin – Janelle Luxury Hairs</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="admin-page">
    <header class="admin-header">
      <div class="admin-header-inner">
        <a href="index.html" class="admin-logo"
          ><span>Janelle</span><small>Admin Panel</small></a
        ><a href="index.html" class="admin-back-btn"
          ><i class="bi bi-arrow-left"></i> Back to Store</a
        >
        <button id="admin-logout" class="admin-logout-btn">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </header>
    <main class="admin-main">
      <aside class="admin-sidebar">
        <nav>
          <button class="admin-nav-btn active" data-tab="orders">
            <i class="bi bi-bag-check"></i> Orders</button
          ><button class="admin-nav-btn" data-tab="chat">
            <i class="bi bi-chat-dots"></i> Chat
            <span id="unread-badge" class="unread-badge">0</span></button
          ><button class="admin-nav-btn" data-tab="reviews">
            <i class="bi bi-star"></i> Reviews
            <span id="pending-reviews-badge" class="unread-badge">0</span>
          </button>
          <button class="admin-nav-btn" data-tab="products">
            <i class="bi bi-box-seam"></i> Products
          </button>
        </nav>
      </aside>
      <div class="admin-content">
        <div id="admin-tab-orders" class="admin-tab active">
          <div class="admin-tab-header">
            <h2>All Orders</h2>
            <span id="orders-count" class="admin-count"></span>
          </div>
          <div id="admin-orders-list">
            <p class="admin-empty">Loading orders...</p>
          </div>
          <div id="admin-orders-pagination" class="admin-pagination"></div>
        </div>
        <div id="admin-tab-chat" class="admin-tab">
          <div class="admin-tab-header">
            <h2>Chat</h2>
            <span id="chat-conversations-count" class="admin-count"></span>
          </div>
          <div class="admin-chat-layout">
            <div id="admin-chat-list" class="admin-chat-list">
              <p class="admin-empty">Loading conversations...</p>
            </div>
            <div class="admin-chat-thread-panel">
              <div
                id="admin-chat-thread-header"
                class="admin-chat-thread-header"
                style="display: none"
              ></div>
              <div id="admin-chat-thread" class="admin-chat-thread">
                <p class="admin-empty">
                  Select a conversation to view messages.
                </p>
              </div>
              <div
                id="admin-chat-input-row"
                class="admin-chat-input-row"
                style="display: none"
              >
                <button
                  type="button"
                  id="admin-chat-photo-btn"
                  class="chat-photo-btn"
                  title="Attach a photo"
                >
                  <i class="bi bi-image"></i></button
                ><input
                  type="file"
                  id="admin-chat-photo-input"
                  accept="image/*"
                  style="display: none"
                /><input
                  type="text"
                  id="admin-chat-text-input"
                  class="chat-text-input"
                  placeholder="Type a reply..."
                /><button
                  type="button"
                  id="admin-chat-send-btn"
                  class="chat-send-btn"
                >
                  <i class="bi bi-send-fill"></i>
                </button>
              </div>
              <div
                id="admin-chat-photo-preview"
                class="chat-photo-preview"
                style="display: none"
              >
                <img
                  id="admin-chat-photo-preview-img"
                  src=""
                  alt="Attached photo"
                /><button type="button" id="admin-chat-photo-remove-btn">
                  ✕
                </button>
              </div>
            </div>
          </div>
        </div>
        <div id="admin-tab-reviews" class="admin-tab">
          <div class="admin-tab-header">
            <h2>Review Moderation</h2>
            <span id="reviews-count" class="admin-count"></span>
          </div>
          <div id="admin-reviews-list">
            <p class="admin-empty">Loading reviews...</p>
          </div>
        </div>
        <div id="admin-tab-products" class="admin-tab">
          <div class="admin-tab-header">
            <h2>Products</h2>
            <span id="products-count" class="admin-count"></span
            ><button id="add-product-btn" class="admin-add-btn">
              <i class="bi bi-plus-lg"></i> Add Product
            </button>
          </div>
          <div id="admin-products-list" class="admin-product-grid">
            <p class="admin-empty">Loading products...</p>
          </div>
        </div>
      </div>
    </main>
    <div
      id="product-modal-overlay"
      class="admin-modal-overlay"
      style="display: none"
    >
      <div class="admin-modal">
        <div class="admin-modal-header">
          <h3 id="product-modal-title">Add Product</h3>
          <button id="product-modal-close" class="admin-modal-close">✕</button>
        </div>
        <form id="product-form">
          <input type="hidden" id="pf-original-id" value="" />
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>Product ID (slug, no spaces)</label
              ><input
                type="text"
                id="pf-id"
                placeholder="e.g. silk-press-wig"
                required
              />
            </div>
            <div class="admin-form-group">
              <label>Name</label><input type="text" id="pf-name" required />
            </div>
          </div>
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>Category</label
              ><input
                type="text"
                id="pf-category"
                placeholder="e.g. Wigs"
                required
              />
            </div>
            <div class="admin-form-group">
              <label>Product Photo</label
              ><input type="file" id="pf-img-file" accept="image/*" /><input
                type="hidden"
                id="pf-img"
              /><img
                id="pf-img-preview"
                src=""
                alt="Preview"
                style="
                  display: none;
                  max-width: 140px;
                  margin-top: 0.5rem;
                  border-radius: 6px;
                  border: 1px solid #2a2a2a;
                "
              />
              <p
                id="pf-img-status"
                style="font-size: 0.72rem; color: #666; margin-top: 0.3rem"
              ></p>
            </div>
          </div>
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>Price (₦)</label
              ><input type="number" id="pf-numericPrice" required />
            </div>
            <div class="admin-form-group">
              <label>Old Price (optional, for sale badge)</label
              ><input type="number" id="pf-oldPrice" />
            </div>
          </div>
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>Badge (optional)</label
              ><input
                type="text"
                id="pf-badge"
                placeholder="e.g. New, Best Seller"
              />
            </div>
            <div class="admin-form-group">
              <label>Stock</label
              ><input type="number" id="pf-stock" value="0" required />
            </div>
          </div>
          <div class="admin-form-group">
            <label>Description</label
            ><textarea id="pf-desc" rows="3"></textarea>
          </div>
          <div class="admin-form-group">
            <label>Specs (one per line, "Label: Value")</label
            ><textarea
              id="pf-specs"
              rows="4"
              placeholder="Hair Type: 100% Human Hair&#10;Style: Straight"
            ></textarea>
          </div>
          <div class="admin-form-row">
            <label class="admin-checkbox-label"
              ><input type="checkbox" id="pf-featured" /> Featured</label
            ><label class="admin-checkbox-label"
              ><input type="checkbox" id="pf-active" checked /> Active (visible
              on site)</label
            >
          </div>
          <div class="admin-modal-actions">
            <button
              type="button"
              id="product-form-cancel"
              class="admin-btn-secondary"
            >
              Cancel</button
            ><button type="submit" class="admin-btn-primary">
              Save Product
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="js/admin.js"></script>
  </body>
</html>
