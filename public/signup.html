<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sign Up – Janelle Luxury Hairs</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="index.html"
            ><span class="auth-logo-main">Janelle</span
            ><span class="auth-logo-sub">Luxury Hairs & Accessories</span></a
          >
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join Janelle Luxury Hairs today</p>
        <div id="auth-error" class="auth-error" style="display: none"></div>
        <form id="signup-form" class="auth-form">
          <div class="auth-group">
            <label>Full Name</label
            ><input
              type="text"
              id="signup-name"
              placeholder="Your full name"
              required
            />
          </div>
          <div class="auth-group">
            <label>Email Address</label
            ><input
              type="email"
              id="signup-email"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="auth-group">
            <label>Phone Number</label
            ><input type="tel" id="signup-phone" placeholder="08012345678" />
          </div>
          <div class="auth-group">
            <label>Password</label
            ><input
              type="password"
              id="signup-password"
              placeholder="At least 6 characters"
              required
            />
          </div>
          <div class="auth-group">
            <label>Confirm Password</label
            ><input
              type="password"
              id="signup-confirm"
              placeholder="Repeat your password"
              required
            />
          </div>
          <button type="submit" id="signup-btn" class="auth-btn">
            Create Account
          </button>
        </form>
        <p class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
        <p class="auth-footer"><a href="index.html">← Back to Store</a></p>
      </div>
    </div>
    <script src="js/auth.js"></script>
  </body>
</html>
