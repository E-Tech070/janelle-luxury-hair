<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Reset Password – Janelle Luxury Hairs</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="index.html"
            ><span class="auth-logo-main">Janelle</span
            ><span class="auth-logo-sub">Luxury Hairs & Accessories</span></a
          >
        </div>
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Choose a new password</p>
        <div id="auth-error" class="auth-error" style="display: none"></div>
        <div id="auth-success" class="auth-success" style="display: none"></div>
        <form id="reset-form" class="auth-form">
          <div class="auth-group">
            <label>New Password</label
            ><input
              type="password"
              id="reset-password"
              placeholder="At least 6 characters"
              required
            />
          </div>
          <div class="auth-group">
            <label>Confirm New Password</label
            ><input
              type="password"
              id="reset-confirm"
              placeholder="Re-enter password"
              required
            />
          </div>
          <button type="submit" id="reset-btn" class="auth-btn">
            Reset Password
          </button>
        </form>
        <p class="auth-footer"><a href="login.html">← Back to Sign In</a></p>
      </div>
    </div>
    <script src="js/auth.js"></script>
  </body>
</html>
