<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>My Account – Janelle Luxury Hairs</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/account.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="account-page">
    <header class="acc-header">
      <div class="acc-header-inner">
        <a href="index.html" class="acc-logo"
          ><span>Janelle</span><small>Luxury Hairs</small></a
        >
        <div class="acc-header-actions">
          <a href="index.html" class="acc-back-btn"
            ><i class="bi bi-arrow-left"></i> Back to Store</a
          ><button id="logout-btn" class="acc-logout-btn">
            <i class="bi bi-box-arrow-right"></i> Logout
          </button>
        </div>
      </div>
    </header>
    <main class="acc-main">
      <div class="acc-sidebar">
        <div class="acc-user-info">
          <div class="acc-avatar"><i class="bi bi-person-circle"></i></div>
          <h3 id="acc-name">Loading...</h3>
          <p id="acc-email"></p>
        </div>
        <nav class="acc-nav">
          <button class="acc-nav-btn active" data-tab="orders">
            <i class="bi bi-bag"></i> My Orders</button
          ><button class="acc-nav-btn" data-tab="chat">
            <i class="bi bi-chat-dots"></i> Chat with Us
            <span
              id="chat-unread-badge"
              class="unread-badge"
              style="display: none"
              >0</span
            >
          </button>
        </nav>
      </div>
      <div class="acc-content">
        <div id="tab-orders" class="acc-tab active">
          <h2>My Orders</h2>
          <div id="orders-list"><p class="acc-empty">Loading orders...</p></div>
        </div>
        <div id="tab-chat" class="acc-tab">
          <h2>Chat with Us</h2>
          <p class="acc-tab-desc">
            Message us directly — no need to leave the site or open WhatsApp.
          </p>
          <div id="chat-thread" class="chat-thread">
            <p class="acc-empty">Loading conversation...</p>
          </div>
          <div class="chat-input-row">
            <button
              type="button"
              id="chat-photo-btn"
              class="chat-photo-btn"
              title="Attach a photo"
            >
              <i class="bi bi-image"></i></button
            ><input
              type="file"
              id="chat-photo-input"
              accept="image/*"
              style="display: none"
            /><input
              type="text"
              id="chat-text-input"
              class="chat-text-input"
              placeholder="Type a message..."
              maxlength="2000"
            /><button type="button" id="chat-send-btn" class="chat-send-btn">
              <i class="bi bi-send-fill"></i>
            </button>
          </div>
          <div
            id="chat-photo-preview"
            class="chat-photo-preview"
            style="display: none"
          >
            <img
              id="chat-photo-preview-img"
              src=""
              alt="Attached photo"
            /><button type="button" id="chat-photo-remove-btn">✕</button>
          </div>
        </div>
      </div>
    </main>
    <script src="js/account.js"></script>
  </body>
</html>
